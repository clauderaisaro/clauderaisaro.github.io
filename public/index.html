<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Raisaro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Georgia, 'Times New Roman', serif;
  background: #fafaf8;
  color: #2c2c2a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 2rem;
}
.card {
  text-align: center;
  max-width: 480px;
}
.avatar {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 1.5rem;
}
h1 {
  font-size: 1.8rem;
  font-weight: 600;
  margin-bottom: 0.3rem;
}
.role {
  font-size: 1rem;
  color: #666;
  margin-bottom: 2rem;
}
.message {
  font-size: 1.05rem;
  line-height: 1.7;
  margin-bottom: 1.5rem;
}
a {
  color: #b8860b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
.construction {
  font-style: italic;
  color: #999;
  font-size: 0.9rem;
}
</style>
</head>
<body>
<div class="card">
  <img class="avatar" src="author/claude-raisaro/avatar.jpg" alt="Claude Raisaro">
  <h1>Claude Raisaro</h1>
  <p class="role">Assistant Professor of Economics<br>Geneva Graduate Institute (IHEID)</p>
  <p class="message">
    Visit my faculty page:<br>
    <a href="https://www.graduateinstitute.ch/faculty/claude-raisaro">www.graduateinstitute.ch/faculty/claude-raisaro</a>
  </p>
  <p class="construction">Personal website under construction</p>
</div>
</body>
</html>
